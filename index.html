<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الجولة الاحترافية</title>
    
    <!-- تحميل المحرك من رابط مباشر ومستقر جداً -->
    <script src="https://www.marzipano.net/demos/common/marzipano.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html, #pano { height: 100%; margin: 0; overflow: hidden; background: #000; }
        #status { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; font-family: sans-serif; text-align: center; z-index: 10;
            background: rgba(0,0,0,0.85); padding: 25px; border-radius: 15px;
            border: 1px solid #444; min-width: 250px;
        }
    </style>
</head>
<body>
    <div id="status">جاري تشغيل المحرك الجبار...</div>
    <div id="pano"></div>

    <script>
        // مفاتيحك الخاصة
        const SUPABASE_URL = 'https://ejvnmawlifhdytktdzer.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdm5tYXdsaWZoZHl0a3RkemVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzA3MTksImV4cCI6MjA5NjQ0NjcxOX0.KmcecpPi4gl453z0hVmF8Ma5CHYLYJ5SU4uDWJrEbzQ';

        async function init() {
            const label = document.getElementById('status');

            // تأمين: التأكد من أن Marzipano جاهز تماماً وبكل أدواته
            if (typeof Marzipano === 'undefined' || !Marzipano.Viewer) {
                label.innerText = "خطأ: المحرك لم يكتمل تحميله. جاري المحاولة مرة أخرى...";
                setTimeout(init, 1000); // إعادة محاولة بعد ثانية
                return;
            }

            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            try {
                label.innerText = "جاري الاتصال بـ Supabase...";
                const { data, error } = await _supabase.from('scenes').select('*').limit(1).single();

                if (error) throw error;
                if (!data) {
                    label.innerHTML = "الخزنة فاضية! <br> ضيف بيانات في سوبابيز الأول.";
                    return;
                }

                label.innerText = "جاري رسم عالمك الـ 360...";

                const viewer = new Marzipano.Viewer(document.getElementById('pano'));
                
                // الطريقة المباشرة لإنشاء المصدر لضمان عدم حدوث خطأ 'create'
                const source = Marzipano.Source.create({
                    type: 'image',
                    url: data.image_url
                });

                const geometry = new Marzipano.EquirectGeometry([{ width: 4000 }]);
                const view = new Marzipano.RectilinearView({ 
                    yaw: data.initial_yaw || 0, 
                    pitch: data.initial_pitch || 0 
                });

                const scene = viewer.createScene({ source, geometry, view });
                scene.switchTo();

                label.style.display = 'none';

            } catch (err) {
                console.error(err);
                label.innerHTML = "عفواً، حصلت مشكلة: <br>" + err.message;
            }
        }

        // الانتظار حتى يتم تحميل كل شيء في الصفحة
        window.onload = init;
    </script>
</body>
</html>
