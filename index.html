<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>المعمار الجبار - نسخة العودة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- الروابط دي هي اللي كانت شغالة عندك في المنظومة القديمة -->
    <script src="https://www.marzipano.net/demos/common/es5-shim.js"></script>
    <script src="https://www.marzipano.net/marzipano.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html, #pano { height: 100%; margin: 0; overflow: hidden; background: #000; }
        #loading { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; font-family: sans-serif; z-index: 10; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">جاري استعادة المنظومة...</div>
    <div id="pano"></div>

    <script>
        // مفاتيحك اللي مش هتتغير
        const S_URL = 'https://ejvnmawlifhdytktdzer.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdm5tYXdsaWZoZHl0a3RkemVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzA3MTksImV4cCI6MjA5NjQ0NjcxOX0.KmcecpPi4gl453z0hVmF8Ma5CHYLYJ5SU4uDWJrEbzQ';

        async function init() {
            const loadLabel = document.getElementById('loading');

            // فحص وجود المحرك (Marzipano)
            if (typeof Marzipano === 'undefined') {
                loadLabel.innerText = "المحرك تائه.. جاري إعادة المحاولة...";
                setTimeout(init, 1000);
                return;
            }

            const supabaseClient = supabase.createClient(S_URL, S_KEY);

            try {
                // جلب البيانات
                const { data, error } = await supabaseClient.from('scenes').select('*').limit(1).single();
                if (error) throw error;

                // إعداد العارض (Viewer)
                const viewer = new Marzipano.Viewer(document.getElementById('pano'));
                
                // الطريقة اللي كانت شغالة في مشروعك القديم 100%
                const source = Marzipano.Source.create({
                    type: 'image',
                    url: data.image_url
                });
                
                const geometry = new Marzipano.EquirectGeometry([{ width: 4000 }]);
                const view = new Marzipano.RectilinearView({ yaw: 0, pitch: 0 });

                const scene = viewer.createScene({ source, geometry, view });
                scene.switchTo();
                
                loadLabel.style.display = 'none';
                console.log("المنظومة تعمل بنجاح!");

            } catch (err) {
                loadLabel.innerHTML = "<b style='color:red'>خطأ في البيانات:</b><br>" + err.message;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
