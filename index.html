<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الجولة - نسخة الحسم النهائي</title>
    
    <!-- روابط المحرك الأساسية -->
    <script src="https://www.marzipano.net/marzipano.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html, #pano { height: 100%; margin: 0; overflow: hidden; background: #000; }
        #status { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; font-family: sans-serif; text-align: center; z-index: 100;
            background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 2px solid #333;
        }
        .error-msg { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">جاري تشغيل المنظومة الاحترافية...</div>
    <div id="pano"></div>

    <script>
        const SUPABASE_URL = 'https://ejvnmawlifhdytktdzer.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdm5tYXdsaWZoZHl0a3RkemVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzA3MTksImV4cCI6MjA5NjQ0NjcxOX0.KmcecpPi4gl453z0hVmF8Ma5CHYLYJ5SU4uDWJrEbzQ';

        async function startEngine() {
            const label = document.getElementById('status');

            // 1. فحص وجود المحرك (بدون شروط معقدة)
            if (typeof window.Marzipano === 'undefined') {
                label.innerHTML = "<span class='error-msg'>المحرك لم يتحمل بعد..</span><br>تأكد من اتصال الإنترنت أو جرب متصفح Chrome.";
                return;
            }

            label.innerText = "المحرك جاهز.. جاري سحب صورتك الـ 360...";

            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            try {
                const { data, error } = await _supabase.from('scenes').select('*').limit(1).single();
                if (error) throw error;
                if (!data) {
                    label.innerHTML = "الجدول فاضي! ضيف بيانات في Supabase.";
                    return;
                }

                label.innerText = "جاري رسم العالم الافتراضي...";

                // --- الحل الجذري: استخدام الـ Constructors المباشرة بدلاً من .create ---
                const viewer = new Marzipano.Viewer(document.getElementById('pano'));
                
                // بديل لـ Marzipano.Source.create
                const source = new Marzipano.ImageUrlSource(function(tile) {
                    return { url: data.image_url };
                });

                // بديل لـ Marzipano.EquirectGeometry
                const geometry = new Marzipano.EquirectGeometry([{ width: 4000 }]);
                
                const view = new Marzipano.RectilinearView({ yaw: 0, pitch: 0 });

                const scene = viewer.createScene({
                    source: source,
                    geometry: geometry,
                    view: view
                });

                scene.switchTo();
                
                // إخفاء رسالة التحميل
                label.style.display = 'none';

            } catch (err) {
                console.error(err);
                label.innerHTML = "<span class='error-msg'>مشكلة في البيانات:</span><br>" + err.message;
            }
        }

        // تشغيل المنظومة بعد ثانية واحدة لضمان استقرار كل شيء
        window.onload = () => {
            setTimeout(startEngine, 1000);
        };
    </script>
</body>
</html>
