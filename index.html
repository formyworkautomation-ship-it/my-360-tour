<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنظومة الجبارة - نسخة الحسم</title>
    
    <!-- محاولة تحميل المحرك من 3 مصادر مختلفة لضمان الوصول -->
    <script src="https://cdn.jsdelivr.net/npm/marzipano@0.10.2/dist/marzipano.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html, #pano { height: 100%; margin: 0; overflow: hidden; background: #000; }
        #status { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; font-family: sans-serif; text-align: center; z-index: 100;
            background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 2px solid #ff0000;
        }
    </style>
</head>
<body>
    <div id="status">جاري فحص المحرك.. ثواني وهتتحل</div>
    <div id="pano"></div>

    <script>
        const SUPABASE_URL = 'https://ejvnmawlifhdytktdzer.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdm5tYXdsaWZoZHl0a3RkemVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzA3MTksImV4cCI6MjA5NjQ0NjcxOX0.KmcecpPi4gl453z0hVmF8Ma5CHYLYJ5SU4uDWJrEbzQ';

        async function startEngine() {
            const label = document.getElementById('status');

            // تأكيد وجود المحرك
            if (typeof Marzipano === 'undefined') {
                label.innerHTML = "<b style='color:red'>المحرك لسه مش ظاهر!</b><br>جرب تفتح اللينك ده من الموبايل أو متصفح تاني (Chrome)";
                return;
            }

            label.innerText = "المحرك اشتغل! جاري جلب الصورة من سوبابيز...";

            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            try {
                const { data, error } = await _supabase.from('scenes').select('*').limit(1).single();
                if (error) throw error;

                label.innerText = "بياناتك سليمة.. جاري رسم الـ 360...";

                const viewer = new Marzipano.Viewer(document.getElementById('pano'));
                const source = Marzipano.Source.create({ type: 'image', url: data.image_url });
                const geometry = new Marzipano.EquirectGeometry([{ width: 4000 }]);
                const view = new Marzipano.RectilinearView({ yaw: 0, pitch: 0 });

                const scene = viewer.createScene({ source, geometry, view });
                scene.switchTo();
                
                label.style.display = 'none';

            } catch (err) {
                label.innerHTML = "مشكلة في البيانات: " + err.message;
            }
        }

        // تشغيل بعد التأكد من تحميل الصفحة
        window.onload = () => {
            setTimeout(startEngine, 1000); // استراحة ثانية للتأكد من المكتبات
        };
    </script>
</body>
</html>
