<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الجولة الجبارة - النسخة القاتلة</title>
    
    <!-- تحميل المحرك من مصدر عالمي ومستقر جداً (Unpkg) -->
    <script src="https://unpkg.com/marzipano@0.10.2/dist/marzipano.js"></script>
    <!-- تحميل مكتبة سوبابيز -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html, #pano { height: 100%; margin: 0; overflow: hidden; background: #000; }
        #status { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; font-family: sans-serif; text-align: center; z-index: 10;
            background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px;
            border: 2px solid #555;
        }
        .error { color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">جاري إيقاظ المحرك...</div>
    <div id="pano"></div>

    <script>
        const SUPABASE_URL = 'https://ejvnmawlifhdytktdzer.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdm5tYXdsaWZoZHl0a3RkemVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzA3MTksImV4cCI6MjA5NjQ0NjcxOX0.KmcecpPi4gl453z0hVmF8Ma5CHYLYJ5SU4uDWJrEbzQ';

        function start() {
            const label = document.getElementById('status');

            // 1. التأكد من أن المحرك موجود فعلاً في ذاكرة المتصفح
            if (typeof window.Marzipano === 'undefined') {
                label.innerHTML = "<span class='error'>عفواً.. المحرك تائه في الطريق!</span><br>جاري إعادة المحاولة خلال ثواني...";
                setTimeout(start, 2000);
                return;
            }

            label.innerText = "المحرك استيقظ! جاري جلب صورتك الـ 360...";

            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            _supabase.from('scenes').select('*').limit(1).single()
            .then(({ data, error }) => {
                if (error) throw error;
                if (!data) {
                    label.innerHTML = "الخزنة فاضية! ضيف صف في جدول scenes";
                    return;
                }

                label.innerText = "جاري إنشاء العالم الافتراضي...";

                // استخدام window.Marzipano لضمان الوصول المباشر
                const viewer = new window.Marzipano.Viewer(document.getElementById('pano'));
                
                const source = window.Marzipano.Source.create({
                    type: 'image',
                    url: data.image_url
                });

                const geometry = new window.Marzipano.EquirectGeometry([{ width: 4000 }]);
                const view = new window.Marzipano.RectilinearView({ 
                    yaw: data.initial_yaw || 0, 
                    pitch: data.initial_pitch || 0 
                });

                const scene = viewer.createScene({ source, geometry, view });
                scene.switchTo();

                label.style.display = 'none';
            })
            .catch(err => {
                label.innerHTML = "<span class='error'>حدث خطأ:</span><br>" + err.message;
                console.error(err);
            });
        }

        // الانتظار حتى تحميل الصفحة بالكامل
        window.onload = start;
    </script>
</body>
</html>
