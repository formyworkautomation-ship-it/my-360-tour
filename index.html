<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>العودة للمنظومة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- روابط المحرك من الموقع الرسمي مباشرة كما كانت في مشروعك القديم -->
    <script src="https://www.marzipano.net/demos/common/es5-shim.js"></script>
    <script src="https://www.marzipano.net/marzipano.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html, #pano { height: 100%; margin: 0; overflow: hidden; background: #000; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); color: white; display: flex; 
            align-items: center; justify-content: center; z-index: 1000;
            font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>
    <div id="overlay">جاري محاولة تشغيل الصورة...</div>
    <div id="pano"></div>

    <script>
        const SUPABASE_URL = 'https://ejvnmawlifhdytktdzer.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdm5tYXdsaWZoZHl0a3RkemVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzA3MTksImV4cCI6MjA5NjQ0NjcxOX0.KmcecpPi4gl453z0hVmF8Ma5CHYLYJ5SU4uDWJrEbzQ';

        function initApp() {
            const overlay = document.getElementById('overlay');

            // فحص وجود المحرك
            if (typeof Marzipano === 'undefined') {
                overlay.innerHTML = "المحرك لسه مش راضي يوصل..<br>جاري المحاولة خلال ثواني...";
                setTimeout(initApp, 2000);
                return;
            }

            const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            client.from('scenes').select('*').limit(1).single()
            .then(({ data, error }) => {
                if (error) throw error;
                
                const viewer = new Marzipano.Viewer(document.getElementById('pano'));
                const source = Marzipano.Source.create({ type: 'image', url: data.image_url });
                const geometry = new Marzipano.EquirectGeometry([{ width: 4000 }]);
                const view = new Marzipano.RectilinearView({ yaw: 0, pitch: 0 });

                const scene = viewer.createScene({ source, geometry, view });
                scene.switchTo();
                
                overlay.style.display = 'none';
            })
            .catch(err => {
                overlay.innerHTML = "حدث خطأ في البيانات: " + err.message;
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
